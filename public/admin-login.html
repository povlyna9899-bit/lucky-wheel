<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Admin Login</title>

<link rel="stylesheet" href="style-login.css">
<link rel="stylesheet" href="style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>

<body>

<div class="background"></div>
<div class="particles"></div>

<div class="login-container">

  <div class="login-card" id="loginCard">

    <div class="logo">
      <i class="fa-solid fa-shield-halved"></i>
      <h2>Secure Admin</h2>
    </div>

    <div class="input-group">
      <i class="fa fa-user"></i>
      <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-group">
      <i class="fa fa-lock"></i>
      <input type="password" id="password" placeholder="Password">
      <span class="toggle" onclick="togglePassword()">
        <i class="fa fa-eye"></i>
      </span>
    </div>

    <div class="options">
      <label>
        <input type="checkbox" id="remember"> Remember me
      </label>
    </div>

    <button id="loginBtn">
      <span id="btnText">Secure Login</span>
      <span class="spinner" id="spinner" style="display:none"></span>
    </button>

    <p id="error" class="error"></p>

  </div>

</div>

<script>

/* Toggle password */
function togglePassword() {

  const pass = document.getElementById("password");

  pass.type = pass.type === "password" ? "text" : "password";

}

/* Press Enter Login */
document.addEventListener("keypress", function(e){

  if(e.key === "Enter"){
    loginAdmin();
  }

});

/* Check existing login */
const token = localStorage.getItem("adminToken");

if(token){
  window.location.href="/admin";
}

/* Login function */
async function loginAdmin(){

  const btn = document.getElementById("loginBtn");
  const spinner = document.getElementById("spinner");
  const text = document.getElementById("btnText");
  const error = document.getElementById("error");
  const card = document.getElementById("loginCard");

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!username || !password){

    error.innerText="Please enter username and password";
    return;

  }

  spinner.style.display="inline-block";
  text.style.display="none";
  btn.disabled=true;
  error.innerText="";

  try{

    const res = await fetch("/admin-login",{

      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({username,password})

    });

    const data = await res.json();

    if(data.success){

      localStorage.setItem("adminToken",data.token);
      localStorage.setItem("adminRole",data.role);
      localStorage.setItem("adminPrefix",data.prefix);

      window.location.href="/admin";

    }else{

      card.classList.add("shake");
      setTimeout(()=>card.classList.remove("shake"),500);

      error.innerText = data.message || "Invalid login";

    }

  }catch(err){

    error.innerText="Server error";

  }

  spinner.style.display="none";
  text.style.display="inline";
  btn.disabled=false;

}

/* Button click */
document.getElementById("loginBtn").addEventListener("click",loginAdmin);

</script>

</body>
</html>
