/* 🔥 ដាក់ prizes លើគេបំផុត */

];

let currentRotation = 0;

/* បន្ទាប់មកទើបមាន function drawWheel */
function drawWheel(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const arc = 2*Math.PI/prizes.length;
  ctx.font = "bold 16px Segoe UI";
  ctx.textAlign = "right";

  for(let i=0;i<prizes.length;i++){
    ctx.beginPath();
    ctx.moveTo(canvas.width/2,canvas.height/2);

    ctx.fillStyle = (i % 2 === 0) ? "#ffd700" : "#1a1a1a";

    ctx.arc(
      canvas.width/2,
      canvas.height/2,
      canvas.width/2,
      i * arc - Math.PI/2,
      (i + 1) * arc - Math.PI/2
    );

    ctx.fill();

    ctx.save();
    ctx.translate(canvas.width/2,canvas.height/2);
    ctx.rotate(i*arc + arc/2 - Math.PI/2);
    ctx.fillStyle = (i % 2 === 0) ? "#000" : "#ffd700";
    ctx.fillText(prizes[i].label,canvas.width/2 - 20,10);
    ctx.restore();
  }
}

drawWheel();

async function spinWheel(){

  if(spinning) return;

  const spinBtn = document.getElementById("spinBtn");
  const topSpinsEl = document.getElementById("topSpins");

  let currentSpins = parseInt(topSpinsEl.innerText);

  if(currentSpins <= 0){
    alert("No spins remaining");
    return;
  }

  spinning = true;
// 🎵 Start spin sound
const spinSound = document.getElementById("spinSound");
spinSound.currentTime = 0;
spinSound.play().catch(()=>{});
  // 🔒 Disable button
  spinBtn.disabled = true;
  spinBtn.innerText = "Spinning...";

  // 🔥 Deduct immediately
  currentSpins -= 1;
  topSpinsEl.innerText = currentSpins;
  checkSpinAnimation(currentSpins);

  const res = await fetch("/spin",{
    method:"POST",
    headers:{ "Authorization":"Bearer "+token }
  });

  const data = await res.json();

  if(!res.ok){
    alert(data.message);
    spinning = false;
    spinBtn.disabled = false;
    spinBtn.innerText = "🎡 SPIN";
    return;
  }

  // 🎯 Find index
  const prizesIndex = prizes.findIndex(p => p.value === data.prize);
  const index = prizesIndex >= 0 ? prizesIndex : 0;

  const sliceDeg = 360 / prizes.length;
  const finalDeg = 360 - (index * sliceDeg) - sliceDeg / 2;
  const totalRotation = 360 * 8 + finalDeg;

  canvas.style.transition = "none";
  canvas.style.transform = "rotate(0deg)";
  void canvas.offsetWidth;

  canvas.style.transition = "transform 10s cubic-bezier(0.1, 0.7, 0.1, 1)";
  canvas.style.transform = `rotate(${totalRotation}deg)`;
  
  setTimeout(()=>{
  spinSound.pause();
  spinSound.currentTime = 0;
    const prizeLabel = prizes[index].label;

    document.getElementById("result").innerText =
      "🎉 " + prizeLabel +
      " | Remaining Spins: " + data.spinsLeft;

    // 🔄 Sync real spins from server
    topSpinsEl.innerText = data.spinsLeft;
    checkSpinAnimation(data.spinsLeft);

    // 🎆 Jackpot effect
    if([100,200].includes(data.prize)){
      superJackpot();
    }

    loadHistory();

    spinning = false;
    spinBtn.disabled = false;
    spinBtn.innerText = "🎡 SPIN";

  },10000);
}

function createFirework(){

  const particleCount = 25; // បន្ថយចំនួន

  const centerX = Math.random() * window.innerWidth;
  const centerY = Math.random() * window.innerHeight * 0.4;

  for(let i=0;i<particleCount;i++){

    const particle = document.createElement("div");
    particle.className = "firework";

    const angle = Math.random() * 2 * Math.PI;
    const distance = Math.random() * 120;

    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance;

    particle.style.left = centerX + "px";
    particle.style.top = centerY + "px";

    // លុប glow ធ្ងន់ៗចេញ
    particle.style.background = "gold";

    particle.animate([
      { transform: "translate(0,0) scale(1)", opacity:1 },
      { transform: `translate(${dx}px,${dy}px) scale(0.3)`, opacity:0 }
    ],{
      duration:700,
      easing:"ease-out"
    });

    document.body.appendChild(particle);
    setTimeout(()=> particle.remove(),700);
  }
}

function superJackpot(){

  
  // 🎆 Fireworks
  let count = 0;
  const interval = setInterval(()=>{
    createFirework();
    count++;

    }
  },250);
