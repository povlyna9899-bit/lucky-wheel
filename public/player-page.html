/* បន្ទាប់មកទើបមាន function drawWheel */
function drawWheel(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const arc = 2*Math.PI/prizes.length;
  ctx.font = "bold 18px Segoe UI";
  ctx.textAlign = "right";

  for(let i=0;i<prizes.length;i++){
    ctx.beginPath();
    ctx.moveTo(canvas.width/2,canvas.height/2);

    ctx.fillStyle = (i % 2 === 0) ? "#ffd700" : "#1a1a1a";

    ctx.arc(
      canvas.width/2,
      canvas.height/2,
      canvas.width/2,
      i * arc - Math.PI/2,
      (i + 1) * arc - Math.PI/2
    );

    ctx.fill();

    ctx.save();
    ctx.translate(canvas.width/2,canvas.height/2);
    ctx.rotate(i*arc + arc/2 - Math.PI/2);
    ctx.fillStyle = (i % 2 === 0) ? "#000" : "#ffd700";
    ctx.fillText(prizes[i].label,canvas.width/2 - 20,10);
    ctx.restore();
  }
}

drawWheel();

const sliceDeg = 360 / prizes.length;

// បង្ខំ browser reflow
void canvas.offsetWidth;

function createFirework(){

  const particleCount = 25; // បន្ថយចំនួន

  const centerX = Math.random() * window.innerWidth;
  const centerY = Math.random() * window.innerHeight * 0.4;

  for(let i=0;i<particleCount;i++){

    const particle = document.createElement("div");
    particle.className = "firework";

    const angle = Math.random() * 2 * Math.PI;
    const distance = Math.random() * 120;

    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance;

    particle.style.left = centerX + "px";
    particle.style.top = centerY + "px";

    // លុប glow ធ្ងន់ៗចេញ
    particle.style.background = "gold";

    particle.animate([
      { transform: "translate(0,0) scale(1)", opacity:1 },
      { transform: `translate(${dx}px,${dy}px) scale(0.3)`, opacity:0 }
    ],{
      duration:700,
      easing:"ease-out"
    });

    document.body.appendChild(particle);
    setTimeout(()=> particle.remove(),700);
  }
}
