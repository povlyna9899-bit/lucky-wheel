<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{background:#f1f5f9;transition:.3s;}
.dark{background:#0f172a;color:white;}
.layout{display:flex;min-height:100vh}
.admin-info{
  display:flex;
  gap:15px;
  margin-bottom:15px;
}
select{
  width:55px;
  padding:6px;
  border-radius:6px;
  border:1px solid #ccc;
  text-align:center;
}
.admin-box{
  background:#f1f5f9;
  padding:10px 15px;
  border-radius:8px;
  font-size:14px;
  font-weight:600;
  color:#1e293b;
}

.dark .admin-box{
  background:#334155;
  color:white;
}

.admin-box span{
  margin-left:6px;
  color:#2563eb;
  font-weight:bold;
}
/* Sidebar */
.sidebar{
  width:240px;
  background:#1e293b;
  color:white;
  padding:25px;
}
.sidebar h2{margin-bottom:20px}
.sidebar button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.logout{background:#ef4444;color:white}
.toggle{background:#2563eb;color:white}

/* Main */
.main{flex:1;padding:40px}
.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
  margin-bottom:25px;
}
.dark .card{background:#1e293b;color:white;}

input{
  width:100%;
  padding:8px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

.btn{
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  margin:2px;
}
.primary{background:#2563eb;color:white}
.danger{background:#ef4444;color:white}
.edit{background:#f59e0b;color:white}
.history{background:#16a34a;color:white}

table{
  width:100%;
  border-collapse: collapse;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

th{
  background:#111827;
  color:#fff;
  padding:12px;
  font-weight:600;
}

td{
  padding:10px;
  border-bottom:1px solid #eee;
}

tr:hover{
  background:#f9fafb;
}

.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-content{
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}
.dark .modal-content{background:#1e293b;}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <h2>Admin Panel</h2>
<button id="createAdminBtn" onclick="openAdminPanel()" 
style="background:#8b5cf6;color:white;border:none;padding:10px;width:100%;border-radius:6px;margin-bottom:10px;">
👑 Create Admin
</button>
  <button onclick="toggleWinning()" 
    style="background:#f39c12;color:white;border:none;padding:10px;width:100%;border-radius:6px;margin-bottom:10px;">
    🎯 Winning Probability
  </button>

  <!-- ✅ WINNING PANEL INSIDE SIDEBAR -->
  <div id="winningPanel" style="display:none; margin-bottom:15px;">

    <h4 style="color:white;">Winning Probability Control</h4>

    <div id="probabilityContainer"></div>

    <p style="color:white;">
      Total: <span id="totalPercent">0</span>%
    </p>

    <button onclick="saveProbability()" 
      style="background:#28a745;color:white;border:none;padding:8px;width:100%;border-radius:6px;">
      Save
    </button>

  </div>

  <button class="toggle" onclick="toggleDark()">Toggle Dark</button>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="main">

<h1>Dashboard</h1>
<p>Total Players: <b id="totalCount">0</b></p>

<div class="card">
<h3>Create Player</h3>

<div style="margin-bottom:10px">

<div class="admin-info">

  <div class="admin-box">
    👤 Admin
    <span id="adminName"></span>
  </div>

  <div class="admin-box">
    🔑 Prefix
    <span id="prefixDisplay"></span>
  </div>

</div>

</div>

<!-- SUPERADMIN INPUT -->
<input type="text" id="playerText" placeholder="Enter Username" style="display:none">

<!-- ADMIN NUMBER SELECT -->
<div id="numberSelect" style="display:flex; gap:5px; margin-bottom:10px">

<select id="num1"></select>
<select id="num2"></select>
<select id="num3"></select>

</div>

<input type="password" id="password" placeholder="Password">

<button class="btn primary" onclick="createPlayer()">Create</button>

</div>

<div class="card">
  <h3>Player List</h3>
  <input type="text" id="search" placeholder="Search..." onkeyup="filterPlayers()">

  <table>
    <thead>
      <tr>
        <th>Username</th>
        <th>Spins</th>
        <th>Balance</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="playerTable"></tbody>
  </table>
</div>
<div class="card" id="adminListCard">
<h3>Admin List</h3>

<table>
<thead>
<tr>
<th>Username</th>
<th>Prefix</th>
<th>Action</th>
</tr>
</thead>

<tbody id="adminTable"></tbody>

</table>

</div>
<div class="card">
  <h3>User Spin History</h3>

  <p>Total Reward: <b id="totalReward">0</b></p>

  <div style="margin-bottom:10px;">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button class="btn primary" onclick="filterHistory()">Filter</button>
    <button class="btn" onclick="resetFilter()">Reset</button>
    <br><br>
    <button class="btn history" onclick="filterToday()">Today</button>
    <button class="btn history" onclick="filterWeek()">This Week</button>
    <button class="btn history" onclick="filterMonth()">This Month</button>
  </div>

  <div id="historyBox"></div>
</div>

<!-- Edit Modal -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <h3>Edit Player</h3>
    <input type="text" id="editUsername">
    <input type="password" id="editPassword" placeholder="New Password">
    <button class="btn primary" onclick="updatePlayer()">Save</button>
  </div>
</div>
<!-- Create Admin Modal -->
<div class="modal" id="adminModal">
  <div class="modal-content">

    <h3>Create Admin</h3>

    <input type="text" id="adminUsername" placeholder="Admin Username">

    <input type="password" id="adminPassword" placeholder="Admin Password">

    <input type="text" id="adminPrefix" placeholder="Prefix Example: CBPAABCC">

    <button class="btn primary" onclick="createAdmin()">
      Create Admin
    </button>

  </div>
</div>

<script>
let playersData = [];
let editingId = "";
let currentHistory = [];
let probabilityUnlocked = false;

 /* LOAD ADMINS */
async function loadAdmins(){

  const res = await fetch("/admins",{
    headers:{
      "Authorization":"Bearer "+token
    }
  });

  if(!res.ok) return;

  const admins = await res.json();

  const table = document.getElementById("adminTable");

  if(!table) return;

  table.innerHTML="";

  admins.forEach(a=>{

    const row=document.createElement("tr");

    row.innerHTML=`
      <td>${a.username}</td>
      <td>${a.prefix || "-"}</td>
      <td>

<button class="btn edit"
onclick="editAdmin('${a._id}')">
Edit
</button>

<button class="btn danger"
onclick="deleteAdmin('${a._id}')">
Delete
</button>

</td>
    `;

    table.appendChild(row);

  });

}

/* DELETE ADMIN */
async function deleteAdmin(id){

  if(!confirm("Delete this admin?")) return;

  await fetch("/delete-admin/"+id,{
    method:"DELETE",
    headers:{
      "Authorization":"Bearer "+token
    }
  });

  loadAdmins();

}
function openAdminPanel(){
  document.getElementById("adminModal").style.display="flex";
}

async function createAdmin(){

  const username = document.getElementById("adminUsername").value;
  const password = document.getElementById("adminPassword").value;
  const prefix = document.getElementById("adminPrefix").value;

  if(!username || !password || !prefix){
    alert("Please fill all fields");
    return;
  }

  const res = await fetch("/create-admin",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({
      username,
      password,
      prefix
    })
  });

  const data = await res.json();

if(data.success){

  alert("Admin created successfully");

  document.getElementById("adminModal").style.display="none";

  loadAdmins();

}else{
  alert(data.message || "Error creating admin");
}

}
const token =
  localStorage.getItem("adminToken") ||
  sessionStorage.getItem("adminToken");

if(!token){
  window.location.href="/admin-login.html";
}

const role = localStorage.getItem("adminRole");

function getAdminData(){
  try{
    const payload = JSON.parse(atob(token.split(".")[1]));
    return payload;
  }catch{
    return {};
  }
}
/* ================= edit admin ================= */
async function editAdmin(id){

const password = prompt("Enter new admin password");

if(!password) return;

const res = await fetch("/edit-admin/"+id,{
method:"PUT",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({password})
});

const data = await res.json();

if(data.success){
alert("Password updated");
}else{
alert("Error updating password");
}

}
/* ================= LOAD PAGE ================= */
window.onload = function(){

  const data = getAdminData();

  document.getElementById("adminName").innerText = data.username || "-";
  document.getElementById("prefixDisplay").innerText = data.prefix || "-";

  loadDigits();

  // ⭐ ROLE CONTROL
  if(role === "superadmin"){

    document.getElementById("numberSelect").style.display="none";
    document.getElementById("playerText").style.display="block";

  }else{

    document.getElementById("numberSelect").style.display="flex";

  }

  if(role !== "superadmin"){

    const btn = document.getElementById("createAdminBtn");
    if(btn) btn.style.display="none";

    const adminCard = document.getElementById("adminListCard");
    if(adminCard) adminCard.style.display="none";

  }

}


/* LOAD PLAYERS */
async function loadPlayers(){

  const res = await fetch("/players",{
    headers:{ "Authorization":"Bearer "+token }
  });

  if(res.status===401 || res.status===403){
    alert("Session expired");
    logout();
    return;
  }

  const data = await res.json();

  // ⭐ SORT PLAYER BY NUMBER
  playersData = data.sort((a,b)=>{

    const numA = parseInt(a.username.match(/\d+$/));
    const numB = parseInt(b.username.match(/\d+$/));

    return numA - numB;

  });

  renderTable(playersData);

}
/* ================= PROBABILITY SYSTEM ================= */

async function loadProbability(){

  const res = await fetch("/api/admin/prize-settings",{
    headers:{
      "Authorization":"Bearer "+token
    }
  });

  if(!res.ok){
    console.log("API error");
    return;
  }

  const prizes = await res.json();

  const container = document.getElementById("probabilityContainer");
  container.innerHTML="";

  let total=0;

  prizes.forEach(p=>{

    total += p.weight;
const prizeLabels = {
  0: "អ្នកឈ្នះ1$",
  5: "អ្នកឈ្នះ2$",
  10: "អ្នកឈ្នះ5$",
  20: "អ្នកឈ្នះ50$",
  30: "អ្នកឈ្នះ100$",
  50: "Free 1 Spin",
  100: "អ្នកឈ្នះ500$",
  200: "I PHONE 17 Pro Max"
};
    container.innerHTML += `
      <div style="margin-bottom:10px;color:white">

        ${prizeLabels[p.value] || p.value+"$"} :

        <input
          type="number"
          class="prob-input"
          data-value="${p.value}"
          value="${p.weight}"
          onchange="calculateTotal()"
        >

      </div>
    `;

  });

  document.getElementById("totalPercent").innerText = total;

}
function calculateTotal(){

  const inputs = document.querySelectorAll(".prob-input");

  let total = 0;

  inputs.forEach(i=>{
    total += Number(i.value) || 0;
  });

  const totalEl = document.getElementById("totalPercent");

  totalEl.innerText = total;

  if(total === 100){
    totalEl.style.color = "lime";
  }else{
    totalEl.style.color = "red";
  }

}
/* ================= SAVE PROBABILITY ================= */
async function saveProbability() {
  const inputs = document.querySelectorAll(".prob-input");

  let data = [];
  let total = 0;

  inputs.forEach(input => {
    const value = Number(input.dataset.value);
    const weight = Number(input.value) || 0;

    total += weight;
    data.push({ value, weight });
  });

  if (total !== 100) {
    alert("Total must equal 100%");
    return;
  }

  const res = await fetch("/api/admin/prize-settings",{
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token   // ✅ ប្រើ token តែមួយ
    },
    body: JSON.stringify(data)
  });

  if(res.ok){
    alert("Saved successfully");
  }else{
    alert("Error saving data");
  }
}

/* SEARCH */

function filterPlayers(){

  const keyword = document.getElementById("search").value.toLowerCase();

  const filtered = playersData.filter(p =>
    p.username.toLowerCase().includes(keyword)
  );

  renderTable(filtered);

}
async function viewHistory(userId){

  const res = await fetch("/api/admin/user-history/"+userId,{
    headers:{
      "Authorization":"Bearer "+token
    }
  });

  const data = await res.json();

  currentHistory = data;

  renderHistory(data);

}
/* ================= CREATE PLAYER ================= */

async function createPlayer(){

  const prefix = getAdminData().prefix || "";
  const password = document.getElementById("password").value;

  let username = "";

  // ⭐ SUPERADMIN
  if(role === "superadmin"){

    username = document.getElementById("playerText").value.trim();

  }
  // ⭐ NORMAL ADMIN
  else{

    const n1 = document.getElementById("num1").value;
    const n2 = document.getElementById("num2").value;
    const n3 = document.getElementById("num3").value;

    const number = n1 + n2 + n3;

    username = prefix + number;

  }

  if(!username || !password){
    alert("Please fill all fields");
    return;
  }

  await fetch("/create-player",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({
      username,
      password
    })
  });

  loadPlayers();

}
/* RENDER TABLE */
function renderTable(data){

  // ✅ SORT USERNAME BY NUMBER
  data.sort((a,b)=>{

    const numA = parseInt(a.username.match(/\d+$/));
    const numB = parseInt(b.username.match(/\d+$/));

    return numA - numB;

  });

  const table = document.getElementById("playerTable");
  table.innerHTML="";

  document.getElementById("totalCount").innerText = data.length;

  data.forEach(p=>{

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${p.username}</td>
      <td>${p.spinsLeft || 0}</td>
      <td>$${p.balance || 0}</td>
      <td>
        <button class="btn history" onclick="viewHistory('${p._id}')">History</button>
        <button class="btn edit" onclick="openEdit('${p._id}','${p.username}')">Edit</button>
        <button class="btn danger" onclick="deletePlayer('${p._id}')">Delete</button>
        <button class="btn primary" onclick="setSpin('${p._id}')">Set Spin</button>
      </td>
    `;

    table.appendChild(row);

  });

}


/* RENDER HISTORY */
function renderHistory(data){
  const box=document.getElementById("historyBox");
  box.innerHTML="";
  let total=0;

  if(!data.length){
    box.innerHTML="No spin history";
    document.getElementById("totalReward").innerText=0;
    return;
  }

 data.forEach(item=>{
  
  let prizeDisplay;
  
  if(typeof item.prize === "number"){
    total += item.prize;
    prizeDisplay = "$" + item.prize;
  } else {
    prizeDisplay = item.prize;
  }

  box.innerHTML += `
    <div style="padding:8px;border-bottom:1px solid #ddd; display:flex; justify-content:space-between;">
      <div>
        🎁 ${item.prizeLabel || "$"+item.prize}
        📅 ${new Date(item.createdAt).toLocaleString()}
      </div>

      <button class="btn danger"
        onclick="clearHistory('${item._id}')">
        Clear
      </button>
    </div>
  `;
});

  document.getElementById("totalReward").innerText=total;
}
/* CLEAR HISTORY */
function clearHistory(id) {
  if (!confirm("Delete this history?")) return;

  fetch("/admin/clear-history/" + id, {
    method: "DELETE",
    headers: {
      "Authorization": "Bearer " + token
    }
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      // reload history បច្ចុប្បន្នវិញ
      renderHistory(
        currentHistory.filter(item => item._id !== id)
      );

      // update currentHistory
      currentHistory = currentHistory.filter(item => item._id !== id);

    } else {
      alert("Delete failed");
    }
  });
}
/* FILTER */
function filterHistory(){
  const start=document.getElementById("startDate").value;
  const end=document.getElementById("endDate").value;
  if(!start||!end)return;

  const filtered=currentHistory.filter(item=>{
    const d=new Date(item.createdAt).toISOString().split("T")[0];
    return d>=start && d<=end;
  });

  renderHistory(filtered);
}

function resetFilter(){
  document.getElementById("startDate").value="";
  document.getElementById("endDate").value="";
  renderHistory(currentHistory);
}

/* QUICK FILTERS */
function formatDate(date){
  return date.toISOString().split("T")[0];
}

function filterToday(){
  const today=new Date();
  document.getElementById("startDate").value=formatDate(today);
  document.getElementById("endDate").value=formatDate(today);
  filterHistory();
}

function filterWeek(){
  const today=new Date();
  const first=new Date(today);
  first.setDate(today.getDate()-today.getDay());
  const last=new Date(first);
  last.setDate(first.getDate()+6);
  document.getElementById("startDate").value=formatDate(first);
  document.getElementById("endDate").value=formatDate(last);
  filterHistory();
}

function filterMonth(){
  const now=new Date();
  const first=new Date(now.getFullYear(),now.getMonth(),1);
  const last=new Date(now.getFullYear(),now.getMonth()+1,0);
  document.getElementById("startDate").value=formatDate(first);
  document.getElementById("endDate").value=formatDate(last);
  filterHistory();
}

/* DELETE */
async function deletePlayer(id){

  if(!confirm("Delete this player?")) return;

  await fetch("/delete/"+id,{
    method:"DELETE",
    headers:{ "Authorization":"Bearer "+token }
  });

  loadPlayers();

}


/* EDIT */
function openEdit(id,username){
  editingId=id;
  document.getElementById("editUsername").value=username;
  document.getElementById("editPassword").value="";
  document.getElementById("editModal").style.display="flex";
}

async function updatePlayer(){
  const username=document.getElementById("editUsername").value;
  const password=document.getElementById("editPassword").value;

  await fetch("/edit-player/"+editingId,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({username,password})
  });

  document.getElementById("editModal").style.display="none";
  loadPlayers();
}

/* SET SPIN */
function setSpin(id){

  const spins = prompt("Enter spin amount:");

  if(!spins) return;

  fetch("/set-spin/"+id,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({spins:Number(spins)})
  }).then(loadPlayers);

}

/* DARK MODE */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("adminToken");
  sessionStorage.removeItem("adminToken");
  window.location.href="/admin-login.html";
}

loadPlayers();
loadProbability();   // បន្ថែមបន្ទាត់នេះ
function toggleWinning(){

  if(!probabilityUnlocked){

    const pass = prompt("Enter Admin 2FA Password");

    if(pass !== "210320"){
      alert("Wrong Password");
      return;
    }

    probabilityUnlocked = true; // unlock
  }

  const panel = document.getElementById("winningPanel");

  if(panel.style.display === "none"){
    panel.style.display = "block";
  }else{
    panel.style.display = "none";
  }

}
loadAdmins();
function loadDigits(){

  const selects = ["num1","num2","num3"];

  selects.forEach(id=>{

    const select = document.getElementById(id);

    if(!select) return;

    select.innerHTML="";

    for(let i=0;i<=9;i++){

      const option = document.createElement("option");

      option.value = i;
      option.textContent = i;

      select.appendChild(option);

    }

  });

}
</script>

</body>
</html>
